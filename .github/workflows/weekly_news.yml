name: Weekly Client News
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run news fetch script
        env:
          GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/fetch_news.py

      - name: Commit and push news data
        run: |
          git config user.name "aralab-news-bot"
          git config user.email "actions@github.com"
          git add data/news/
          git diff --staged --quiet || git commit -m "news: weekly update $(date +%Y-%m-%d)"
          git push
